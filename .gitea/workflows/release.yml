name: Build release jar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    # act_runner labels are configured as "label:executor" (for example
    # "alpine:host"), but workflows match only the label name.
    runs-on: alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java
        run: |
          sudo /sbin/apk update
          sudo /sbin/apk add --no-cache ca-certificates openjdk21-jdk
          sudo update-ca-certificates

      - name: Install build tools
        run: |
          sudo /sbin/apk add --no-cache curl jq unzip

      - name: Check network
        run: |
          curl -4 --fail --location --head https://piston-meta.mojang.com/mc/game/version_manifest_v2.json
          curl -4 --fail --location --head https://piston-data.mojang.com/v1/objects/ba2df812c2d12e0219c489c4cd9a5e1f0760f5bd/client.jar

      - name: Prefetch Minecraft jars
        run: |
          set -eu
          mkdir -p "$HOME/.gradle/caches/fabric-loom/1.21.11"
          curl -4 --fail --location --retry 5 --retry-delay 3 \
            https://piston-meta.mojang.com/mc/game/version_manifest_v2.json \
            -o "$HOME/.gradle/caches/fabric-loom/mojang_versions_manifest.json"
          curl -4 --fail --location --retry 5 --retry-delay 3 \
            https://piston-data.mojang.com/v1/objects/ba2df812c2d12e0219c489c4cd9a5e1f0760f5bd/client.jar \
            -o "$HOME/.gradle/caches/fabric-loom/1.21.11/minecraft-client.jar"
          curl -4 --fail --location --retry 5 --retry-delay 3 \
            https://piston-data.mojang.com/v1/objects/64bb6d763bed0a9f1d632ec347938594144943ed/server.jar \
            -o "$HOME/.gradle/caches/fabric-loom/1.21.11/minecraft-server.jar"

      - name: Build
        env:
          JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false -Dhttp.keepAlive=false
          GRADLE_OPTS: -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false -Dhttp.keepAlive=false
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew --no-daemon --stacktrace clean build
          else
            gradle --no-daemon --stacktrace clean build
          fi

      - name: Collect jars
        run: |
          mkdir -p artifacts
          cp build/libs/*.jar artifacts/
          rm -f artifacts/*-sources.jar
          ls -lah artifacts

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: autorule-jars
          path: artifacts/*.jar
          if-no-files-found: error

      - name: Create Forgejo release and upload jar
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          set -eu
          API="$SERVER/api/v1/repos/$REPO"
          RELEASE_ID="$(curl -fsS \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"Autorule $TAG\",\"draft\":false,\"prerelease\":false}" \
            "$API/releases" | jq -r .id)"

          for jar in artifacts/*.jar; do
            curl -fsS \
              -H "Authorization: token $TOKEN" \
              -F "attachment=@$jar" \
              "$API/releases/$RELEASE_ID/assets?name=$(basename "$jar")"
          done
